<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FF6B6B">
  <meta name="description" content="Learn multiplication by battling cute monsters! Free, no ads, no data collection.">
  <title>How to Multiply — Monster Battle Arena</title>
  <style>
    :root {
      --gold: #FFD700;
      --gold-glow: rgba(255, 215, 0, 0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .screen { display: none; width: 100%; height: 100vh; height: 100dvh; position: absolute; top: 0; left: 0; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    .screen.active { display: flex; flex-direction: column; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }
    .screen.active { animation: fadeIn 0.3s ease; }

    /* Screen shake (Feature 1) */
    @keyframes screenShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .screen-shake { animation: screenShake 0.2s ease; }

    /* Title Screen */
    #title-screen {
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #FF6B6B 0%, #FF8E53 50%, #FFE66D 100%);
      gap: 16px;
    }
    #title-screen h1 {
      font-size: 42px;
      text-shadow: 3px 3px 0 #333;
      text-align: center;
    }
    #title-screen .subtitle {
      font-size: 16px;
      opacity: 0.9;
      color: rgba(255,255,255,0.85);
    }
    .title-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .title-monster {
      font-size: 80px;
      animation: bounce 1s ease-in-out infinite;
    }
    .btn-battle-main {
      width: 100%;
      max-width: 320px;
      min-width: auto;
      padding: 16px 32px;
      font-size: 28px;
      min-height: 56px;
      border-radius: 16px;
    }
    .title-secondary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 320px;
    }
    .title-secondary-grid .btn {
      min-width: auto;
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
    }
    .title-tertiary {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .title-tertiary .btn {
      padding: 8px 16px;
      font-size: 14px;
      min-width: auto;
    }
    .challenge-code-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .challenge-code-input {
      width: 100px;
      padding: 8px 10px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 14px;
      text-align: center;
      letter-spacing: 2px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .btn {
      display: inline-block;
      padding: 16px 48px;
      border: none;
      border-radius: 16px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15), 0 2px 2px rgba(0,0,0,0.1);
      transition: transform 0.1s, box-shadow 0.1s;
      min-width: 200px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 10px rgba(0,0,0,0.2), 0 3px 4px rgba(0,0,0,0.1);
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .btn-primary { background: #4CAF50; color: #fff; }
    .btn-secondary { background: #fff; color: #333; }
    .btn-battle { background: #4CAF50; color: #fff; }
    .btn-collection { background: rgba(255,255,255,0.9); color: #333; }
    .btn-shop { background: rgba(255,255,255,0.9); color: #333; }
    .btn-learn { background: #9b59b6; color: #fff; }
    .btn-challenge { background: #e74c3c; color: #fff; }
    .btn-parent { background: transparent; color: rgba(255,255,255,0.5); font-size: 12px; min-width: auto; padding: 4px 8px; }
    .btn-back {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 8px 16px;
      font-size: 16px;
      min-width: auto;
      background: rgba(0,0,0,0.3);
      color: #fff;
      border-radius: 12px;
    }

    /* Battle Screen */
    #battle-screen {
      background: linear-gradient(180deg, #74b9ff 0%, #81d4fa 40%, #a5d6a7 55%, #66bb6a 100%);
    }
    .battle-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: rgba(0,0,0,0.3);
      font-size: 14px;
      font-weight: bold;
    }
    .battle-topbar .coins { color: var(--gold); }
    .battle-area {
      height: 45vh;
      min-height: 200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
    }
    .monster-slot {
      text-align: center;
      position: relative;
    }
    .monster-emoji {
      font-size: 80px;
      transition: transform 0.3s;
    }
    .monster-emoji.boss { font-size: 96px; }
    .monster-name {
      background: rgba(0,0,0,0.5);
      color: #fff;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      margin-top: 4px;
    }
    .hp-bar {
      width: 100px;
      height: 16px;
      background: #333;
      border-radius: 8px;
      margin: 6px auto 0;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }
    .hp-fill.player { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
    .hp-fill.enemy { background: linear-gradient(90deg, #f44336, #FF9800); }
    @keyframes hpPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .hp-fill.low { animation: hpPulse 0.8s ease-in-out infinite; }
    .vs-text {
      font-size: 32px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #333;
      color: var(--gold);
    }
    .boss-border {
      border: 3px solid var(--gold);
      border-radius: 50%;
      padding: 4px;
      animation: bossPulse 1.5s ease-in-out infinite;
    }
    @keyframes bossPulse {
      0%, 100% { box-shadow: 0 0 10px var(--gold); }
      50% { box-shadow: 0 0 25px var(--gold); }
    }

    /* Question Panel */
    .question-panel {
      flex: 1;
      min-height: 200px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px 20px 0 0;
      border-left: 4px solid var(--gold);
      padding: 24px;
      text-align: center;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    }
    .question-text {
      font-size: 36px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 16px;
    }
    .answer-options {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .answer-btn {
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      min-width: 90px;
    }
    .answer-btn:nth-child(1) { background: #e17055; box-shadow: 0 4px 8px rgba(225,112,85,0.35); }
    .answer-btn:nth-child(2) { background: #0984e3; box-shadow: 0 4px 8px rgba(9,132,227,0.35); }
    .answer-btn:nth-child(3) { background: #6c5ce7; box-shadow: 0 4px 8px rgba(108,92,231,0.35); }
    .answer-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }
    .answer-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 rgba(0,0,0,0.3) !important;
    }
    .answer-btn.correct {
      background: #4CAF50 !important;
      animation: correctPop 0.3s ease;
    }
    .answer-btn.wrong {
      background: #f44336 !important;
      animation: wrongShake 0.4s ease;
    }
    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    @keyframes attackRight {
      0% { transform: translateX(0); }
      40% { transform: translateX(40px); }
      100% { transform: translateX(0); }
    }
    @keyframes attackLeft {
      0% { transform: translateX(0); }
      40% { transform: translateX(-40px); }
      100% { transform: translateX(0); }
    }
    @keyframes shakeHit {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-3deg); }
      75% { transform: translateX(5px) rotate(3deg); }
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-40px); }
    }
    @keyframes hitFlash {
      0% { filter: brightness(1); }
      50% { filter: brightness(2) saturate(0); }
      100% { filter: brightness(1); }
    }
    .hit-flash { animation: hitFlash 0.2s ease; }

    /* Streak counter */
    .streak-counter {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      padding: 4px 14px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(255,107,107,0.5);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .streak-counter.visible {
      opacity: 1;
    }
    .streak-counter.level-5 {
      font-size: 18px;
      animation: streakPulse 0.5s ease-in-out infinite;
    }
    .streak-counter.level-8 {
      font-size: 22px;
      text-shadow: 0 0 10px var(--gold), 0 0 20px #FF6B6B;
    }
    @keyframes streakPulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.1); }
    }

    .monster-card:hover:not(.locked) {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .table-card:hover:not(.locked) {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    /* Focus states for keyboard navigation */
    .btn:focus-visible, .answer-btn:focus-visible, .monster-card:focus-visible, .table-card:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 2px;
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Win/Lose screens */
    .win-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(180deg, #4CAF50, #2E7D32);
    }
    .win-screen .result-emoji { font-size: 64px; }
    .win-screen .result-title { font-size: 36px; font-weight: bold; }
    .win-screen .result-msg { font-size: 22px; }
    .win-screen .result-coins { font-size: 18px; color: var(--gold); }
    .lose-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(180deg, #f44336, #c62828);
    }
    .lose-screen .result-emoji { font-size: 64px; }
    .lose-screen .result-title { font-size: 36px; font-weight: bold; }
    .lose-screen .result-msg { font-size: 22px; }

    /* Boss intro splash */
    .boss-splash {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(180deg, #1a1a2e 0%, #4a148c 50%, #1a1a2e 100%);
    }
    .boss-splash .boss-title {
      font-size: 56px;
      font-weight: bold;
      color: var(--gold);
      text-shadow: 3px 3px 0 #000;
      animation: bossPulse 0.8s ease-in-out infinite;
    }
    .boss-splash .boss-subtitle { font-size: 18px; color: #ce93d8; }
    .boss-splash .boss-emoji {
      font-size: 128px;
      animation: bossZoomIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes bossZoomIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Responsive win/lose screens */
    @media (max-width: 480px) {
      .win-screen .result-title, .lose-screen .result-title { font-size: 28px; }
      .boss-splash .boss-title { font-size: 36px; }
    }

    /* Collection Screen */
    #collection-screen {
      background: linear-gradient(180deg, #1a1a4e 0%, #2d1b69 100%);
      padding: 16px;
    }
    .collection-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .collection-header h2 { font-size: 22px; }
    .monster-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .monster-card {
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
      font: inherit;
      color: inherit;
    }

      border-radius: 14px;
      padding: 12px;
      text-align: center;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }
    .monster-card.owned { border-color: #4CAF50; }
    .monster-card.selected { border-color: var(--gold); background: rgba(255,215,0,0.15); }
    .monster-card.locked { opacity: 0.4; border: 2px dashed #555; cursor: default; }
    .monster-card .m-emoji { font-size: 40px; }
    .monster-card .m-name { color: #fff; font-size: 12px; margin-top: 4px; }
    .monster-card .m-level { font-size: 10px; margin-top: 2px; }
    .monster-card .m-locked-text { color: #f44336; font-size: 10px; margin-top: 4px; }
    .evolution-panel {
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px;
    }
    .evolution-panel h3 { font-size: 14px; margin-bottom: 8px; }
    .evolution-bar {
      width: 100%;
      height: 10px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
    }
    .evolution-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B6B, var(--gold));
      border-radius: 5px;
      transition: width 0.4s;
    }
    .evolution-label { font-size: 11px; color: #888; margin-top: 4px; }

    /* Table Select */
    #table-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px;
    }
    .table-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }
    .table-card {
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .table-card.active { border-color: var(--gold); background: rgba(255,215,0,0.15); }
    .table-card.locked { opacity: 0.3; cursor: default; border: 2px dashed #555; }
    .table-card .t-num { font-size: 28px; font-weight: bold; color: #fff; }
    .table-card .t-label { font-size: 11px; color: #888; margin-top: 4px; }
    .table-card.locked .t-label { color: #f44336; }

    /* Mobile-first responsive */
    @media (max-width: 480px) {
      .question-text { font-size: 26px; }
      .answer-btn { padding: 12px 24px; font-size: 20px; min-width: 70px; }
      .monster-emoji { font-size: 64px !important; }
      .vs-text { font-size: 24px; }
      #title-screen h1 { font-size: 32px; }
      .title-monster { font-size: 80px; }
    }

    @media (min-width: 768px) {
      .question-text { font-size: 40px; }
      .answer-btn { padding: 18px 48px; font-size: 28px; }
      .monster-emoji { font-size: 80px !important; }
      .hp-bar { width: 120px; }
    }

    /* Ensure minimum 44px touch targets */
    .answer-btn { min-height: 44px; }
    .btn { min-height: 44px; }
    .monster-card { min-height: 44px; }
    .table-card { min-height: 44px; }

    /* Feedback panel (Feature 1) */
    .feedback-panel {
      margin-top: 12px;
      font-size: 16px;
      color: #555;
      font-style: italic;
      min-height: 24px;
    }

    /* Array display (Feature 2) */
    .array-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      min-height: 40px;
    }
    .array-row {
      display: flex;
      gap: 4px;
    }
    .array-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #6c5ce7;
      animation: dotAppear 0.1s ease forwards;
      opacity: 0;
    }
    @keyframes dotAppear {
      to { opacity: 1; transform: scale(1); }
    }

    /* Daily challenge button (Feature 6) */
    .btn-daily {
      background: linear-gradient(135deg, #9b59b6, #8e44ad);
      color: #fff;
    }
    .btn-daily:disabled {
      background: #666;
      color: #999;
      cursor: not-allowed;
      opacity: 0.6;
    }
    .btn-daily:disabled:active {
      transform: none;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    }

    /* Best streak display (Feature 5) */
    .best-streak {
      font-size: 16px;
      color: #fff;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* Shop Screen */
    #shop-screen {
      background: linear-gradient(180deg, #1a1a4e 0%, #2d1b69 100%);
      padding: 16px;
    }
    .shop-grid {
      display: grid;

      gap: 12px;
      margin-bottom: 20px;
    }
    .shop-section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #ccc;
    }
    .shop-item {
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      border: 2px solid transparent;
      cursor: pointer;

      font: inherit;
      color: inherit;

    }

    .shop-item .s-name { color: #fff; font-size: 11px; margin-top: 4px; }

    .shop-item .s-owned { color: #4CAF50; font-size: 12px; font-weight: bold; margin-top: 4px; }

      background: linear-gradient(180deg, #1a1a4e 0%, #16213e 100%);
      padding: 16px;
      align-items: center;
    }
    .learn-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 12px;
    }
    .learn-topbar h2 { font-size: 20px; }
    .learn-table-selector {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .learn-table-selector .t-label { font-size: 24px; font-weight: bold; }
    .learn-arrow {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .learn-arrow:active { background: rgba(255,255,255,0.3); }
    .learn-fact {
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
      margin-bottom: 20px;
      min-height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .learn-fact .answer-reveal {

<body>
  <!-- Title Screen -->
  <div id="title-screen" class="screen active">

    <div class="learn-topbar">
      <button class="btn btn-back" onclick="showScreen('title-screen')">Back</button>

      <button class="btn btn-back" onclick="showScreen('title-screen')">Back</button>

      <span></span>
    </div>
    <div id="parent-content"></div>
  </div>

  <!-- Challenge Screen -->
  <div id="challenge-screen" class="screen"></div>

  <script>
    // Game state
    const state = {
      level: 1,
      coins: 0,
      selectedTable: 1,
      selectedMonster: 0,
      monsters: [
        { id: 0, name: 'Flamey', emoji: '\u{1F525}', type: 'Fire', hp: 10, attack: 2, battles: 0, evolved: false }
      ],
      unlockedMonsters: [0],
      streak: 0,
      bestStreak: 0,
      factErrors: {},
      factStats: {},
      lastDailyDate: '',
      battle: { enemy: null, question: null, playerHp: 0, playerMaxHp: 0, processing: false, isDaily: false },
      shop: { background: 'default', effect: 'default', hat: 'none' },
      ownedItems: [],
      learnTable: 1,
      firstPlayDate: ''
    };

    // Monster definitions — single source of truth
    const MONSTER_REGISTRY = [
      { id: 0, name: 'Flamey', emoji: '\u{1F525}', type: 'Fire', hp: 10, attack: 2, unlockLevel: 0, evolveName: 'Mega Flamey', evolveEmoji: '\u{1F30B}', evolveLevel: 20 },
      { id: 1, name: 'Rocky', emoji: '\u{1FAA8}', type: 'Earth', hp: 12, attack: 2, unlockLevel: 5, evolveName: 'Titan Rocky', evolveEmoji: '\u{26F0}\u{FE0F}', evolveLevel: 20 },
      { id: 2, name: 'Sparky', emoji: '\u{26A1}', type: 'Electric', hp: 8, attack: 4, unlockLevel: 10, evolveName: 'Mega Sparky', evolveEmoji: '\u{1F329}\u{FE0F}', evolveLevel: 20 },
      { id: 3, name: 'Frosty', emoji: '\u{2744}\u{FE0F}', type: 'Ice', hp: 14, attack: 3, unlockLevel: 15, evolveName: 'Blizzard', evolveEmoji: '\u{1F328}\u{FE0F}', evolveLevel: 20 },
      { id: 4, name: 'Shadow', emoji: '\u{1F47B}', type: 'Dark', hp: 10, attack: 5, unlockLevel: 20, evolveName: 'Nightmare', evolveEmoji: '\u{1F311}', evolveLevel: 20 }
    ];

    // Unified enemy pool — names, emojis, and table themes in one place
    const MONSTER_ENEMY_POOL = {
      default: {
        names: ['Grumble', 'Snarl', 'Nip', 'Chomp', 'Gnash', 'Bitey', 'Scratch', 'Rumble', 'Growl', 'Snap', 'Pinch', 'Stinger', 'Claw', 'Fang', 'Thorn'],
        emojis: ['\u{1F47E}', '\u{1F984}', '\u{1F40D}', '\u{1F419}', '\u{1F98A}', '\u{1F43B}', '\u{1F432}']
      },
      byTable: {
        1:  { emoji: ['\u{1F47E}', '\u{1F984}', '\u{1F40D}'], names: ['Grumble', 'Snarl', 'Nip'] },
        2:  { emoji: ['\u{1F419}', '\u{1F988}', '\u{1F420}'], names: ['Splash', 'Bubble', 'Coral'] },
        3:  { emoji: ['\u{1F98B}', '\u{1F41E}', '\u{1FAB2}'], names: ['Flutter', 'Buzzy', 'Beetle'] },
        4:  { emoji: ['\u{1F985}', '\u{1F986}', '\u{1F9A5}'], names: ['Talon', 'Quack', 'Fluffy'] },
        5:  { emoji: ['\u{1F420}', '\u{1F419}', '\u{1F42C}'], names: ['Fin', 'Tide', 'Reef'] },
        6:  { emoji: ['\u{1F9CA}', '\u{1F32B}', '\u{2744}\u{FE0F}'], names: ['Chilly', 'Mist', 'Frost'] },
        7:  { emoji: ['\u{1F33B}', '\u{1F33F}', '\u{1F335}'], names: ['Sunny', 'Leafy', 'Spike'] },
        8:  { emoji: ['\u{1F30A}', '\u{1F32C}', '\u{1F32A}'], names: ['Wave', 'Gale', 'Twist'] },
        9:  { emoji: ['\u{1F319}', '\u{1F30D}', '\u{1F308}'], names: ['Luna', 'Globe', 'Arc'] },
        10: { emoji: ['\u{1F47E}', '\u{1F30C}', '\u{1F31F}'], names: ['Nova', 'Comet', 'Star'] },
        11: { emoji: ['\u{2694}\u{FE0F}', '\u{1F6E1}\u{FE0F}', '\u{1F5E1}\u{FE0F}'], names: ['Blade', 'Guard', 'Shiv'] },
        12: { emoji: ['\u{1F47E}', '\u{1F3DB}', '\u{1F3F0}'], names: ['Alien', 'Palace', 'Castle'] }
      }
    };

    // Times table unlock order
    const TABLE_UNLOCK_LEVELS = {
      1: 0, 2: 5, 5: 10, 10: 15, 3: 20, 4: 25,
      6: 30, 7: 35, 8: 40, 9: 45, 11: 50, 12: 55
    };
    const TABLE_ORDER = [1, 2, 5, 10, 3, 4, 6, 7, 8, 9, 11, 12];
    // Shop items
    const SHOP_ITEMS = [
      { id: 'bg-forest', category: 'background', name: 'Enchanted Forest', emoji: '\u{1F332}', price: 50, gradient: 'linear-gradient(180deg, #74b9ff 0%, #81d4fa 40%, #a5d6a7 55%, #66bb6a 100%)' },
      { id: 'bg-space', category: 'background', name: 'Deep Space', emoji: '\u{1F680}', price: 100, gradient: 'linear-gradient(180deg, #0a0e27 0%, #1a1a4e 50%, #2d1b69 100%)' },
      { id: 'bg-ocean', category: 'background', name: 'Ocean depths', emoji: '\u{1F30A}', price: 150, gradient: 'linear-gradient(180deg, #0077b6 0%, #023e8a 50%, #0096c7 100%)' },
      { id: 'fx-stars', category: 'effect', name: 'Star Power', emoji: '\u{2B50}', price: 50, prefix: '\u{2B50}' },
      { id: 'fx-lightning', category: 'effect', name: 'Lightning Strike', emoji: '\u{26A1}', price: 100, prefix: '\u{26A1}' },
      { id: 'fx-hearts', category: 'effect', name: 'Love Blast', emoji: '\u{1F496}', price: 150, prefix: '\u{1F496}' },
      { id: 'hat-crown', category: 'hat', name: 'Royal Crown', emoji: '\u{1F451}', price: 100, overlay: '\u{1F451}' },
      { id: 'hat-wizard', category: 'hat', name: 'Wizard Hat', emoji: '\u{1F9D9}', price: 100, overlay: '\u{1F9D9}' },
      { id: 'hat-party', category: 'hat', name: 'Party Hat', emoji: '\u{1F389}', price: 100, overlay: '\u{1F389}' },
    ];


    // Encouraging messages
    const WIN_MESSAGES = ['Awesome!', 'Great job!', 'You rock!', 'Nailed it!', 'Super star!'];
    const LOSE_MESSAGES = ["Almost! Try again!", "You'll get it!", "So close!", "Keep trying!"];
    const CORRECT_MESSAGES = ['\u{1F44D}', '\u{2B50}', '\u{1F389}', '\u{1F31F}'];

    function generateQuestion(table) {
      // Feature 3: spaced repetition — 30% chance to pick a high-error multiplier
      let a;
      const errorKeys = Object.keys(state.factErrors).filter(k => k.startsWith(table + '_'));
      const highErrorMults = errorKeys
        .map(k => ({ mult: parseInt(k.split('_')[1]), count: state.factErrors[k] }))
        .filter(e => e.count >= 2)
        .sort((a, b) => b.count - a.count)
        .map(e => e.mult);
      if (highErrorMults.length > 0 && Math.random() < 0.3) {
        a = highErrorMults[Math.floor(Math.random() * highErrorMults.length)];
      } else {
        a = Math.floor(Math.random() * 12) + 1;
      }
      const correct = table * a;
      const wrongs = new Set();
      while (wrongs.size < 2) {
        const offset = Math.floor(Math.random() * 9) - 4;
        const wrong = correct + offset;
        if (wrong !== correct && wrong > 0 && !wrongs.has(wrong)) {
          wrongs.add(wrong);
        }
      }
      const options = [correct, ...wrongs];
      // Shuffle
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }
      return { a, table, correct, options };
    }

    function getEnemy(level, table) {
      const isBoss = level % 5 === 0;
      let name, emoji;
      const pool = MONSTER_ENEMY_POOL;
      const theme = (table && pool.byTable[table]) ? pool.byTable[table] : null;
      if (theme) {
        const idx = Math.floor(Math.random() * theme.emoji.length);
        name = theme.names[idx];
        emoji = isBoss ? '\u{1F47E}' : theme.emoji[idx];
      } else {
        name = pool.default.names[Math.floor(Math.random() * pool.default.names.length)];
        emoji = isBoss ? '\u{1F47E}' : pool.default.emojis[Math.floor(Math.random() * pool.default.emojis.length)];
      }
      const hp = Math.floor(8 + level * 1.5) * (isBoss ? 2 : 1);
      const attack = Math.floor(Math.floor(1 + level * 0.3) * (isBoss ? 1.5 : 1));
      return { name, emoji, hp, maxHp: hp, attack, isBoss };
    }

    const SAVE_KEY = 'how-to-multiply-save';

    function saveState() {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        level: state.level,
        coins: state.coins,
        selectedTable: state.selectedTable,
        selectedMonster: state.selectedMonster,
        monsters: state.monsters,
        unlockedMonsters: state.unlockedMonsters,
        streak: state.streak,
        bestStreak: state.bestStreak,
        factErrors: state.factErrors,
        factStats: state.factStats,
        lastDailyDate: state.lastDailyDate,
        shop: state.shop,
        ownedItems: state.ownedItems,
        firstPlayDate: state.firstPlayDate
      }));
    }

    function loadState() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        try {
          const data = JSON.parse(raw);
          Object.assign(state, data);
        } catch(e) { /* fresh state */ }
      }
    }

    // Load on startup
    loadState();
    // Track first play date for parent view
    if (!state.firstPlayDate) {
      state.firstPlayDate = new Date().toISOString().slice(0, 10);
      saveState();
    }
    updateTitleScreen();

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }

    function renderCollection() {
      const owned = state.monsters;
      let html = `
        <div class="collection-header">
          <button class="btn btn-back" onclick="showScreen('title-screen')">Back</button>
          <h2>\u{1F47E} Your Monsters</h2>
          <span style="color:#FFD700">\u{1FA99} ${state.coins}</span>
        </div>
        <div class="monster-grid">
      `;

      MONSTER_REGISTRY.forEach(def => {
        const isOwned = owned.find(m => m.id === def.id);
        const isSelected = state.selectedMonster === def.id;
        const isLocked = !isOwned;

        if (isLocked) {
          html += `
            <div class="monster-card locked" role="button" aria-disabled="true" tabindex="-1">
              <div class="m-emoji">${def.emoji}</div>
              <div class="m-name">???</div>
              <div class="m-locked-text">\u{1F512} Beat Lv.${def.unlockLevel}</div>
            </div>`;
        } else {
          const evolved = isOwned.evolved;
          const emoji = evolved ? def.evolveEmoji : def.emoji;
          const name = evolved ? def.evolveName : def.name;
          const battles = isOwned.battles;
          html += `
            <button class="monster-card ${isSelected ? 'selected' : 'owned'}" onclick="selectMonster(${def.id})">
              <div class="m-emoji">${emoji}</div>
              <div class="m-name">${name}</div>
              <div class="m-level" style="color:${evolved ? '#FFD700' : '#4CAF50'}">${evolved ? '\u{2B50} Evolved' : `${battles}/${def.evolveLevel} battles`}</div>
            </button>`;
        }
      });

      html += '</div>';

      // Evolution panel for selected monster
      const selectedDef = MONSTER_REGISTRY[state.selectedMonster];
      const selectedOwned = owned.find(m => m.id === state.selectedMonster);
      if (selectedOwned && !selectedOwned.evolved) {
        const progress = Math.min(100, (selectedOwned.battles / selectedDef.evolveLevel) * 100);
        html += `
          <div class="evolution-panel">
            <h3>${selectedDef.emoji} ${selectedDef.name} Evolution</h3>
            <div class="evolution-bar"><div class="evolution-fill" style="width:${progress}%"></div></div>
            <div class="evolution-label">${selectedOwned.battles}/${selectedDef.evolveLevel} battles — Evolve into ${selectedDef.evolveName}!</div>
          </div>`;
      } else if (selectedOwned && selectedOwned.evolved) {
        html += `
          <div class="evolution-panel">
            <h3>${selectedDef.evolveEmoji} ${selectedDef.evolveName}</h3>
            <div class="evolution-label">\u{2B50} Fully evolved!</div>
          </div>`;
      }

      document.getElementById('collection-screen').innerHTML = html;
    }

    function selectMonster(id) {
      if (!state.unlockedMonsters.includes(id)) return;
      state.selectedMonster = id;
      saveState();
      renderCollection();
    }

    function renderTableSelect() {
      let html = `
        <div class="collection-header">
          <button class="btn btn-back" onclick="showScreen('battle-screen');renderBattle()">Back</button>
          <h2>\u{1F4D6} Times Tables</h2>
        </div>
        <div class="table-grid">
      `;

      TABLE_ORDER.forEach(table => {
        const unlockLevel = TABLE_UNLOCK_LEVELS[table];
        const isUnlocked = state.level > unlockLevel;
        const isActive = state.selectedTable === table;

        // Feature 4: mastery badge
        const fs = state.factStats[table];
        const mastered = fs && fs.total >= 20 && fs.correct / fs.total >= 0.9;

        html += `
          <button class="table-card ${isActive ? 'active' : ''} ${isUnlocked ? '' : 'locked'}"
               onclick="${isUnlocked ? `selectTable(${table})` : ''}">
            <div class="t-num">x${table}${mastered ? ' \u{2B50}' : ''}</div>
            <div class="t-label">${isUnlocked ? (isActive ? 'Selected' : 'Unlocked') : `\u{1F512} Lv.${unlockLevel + 1}`}</div>
          </button>`;
      });

      html += '</div>';
      document.getElementById('table-screen').innerHTML = html;
    }

    function selectTable(table) {
      state.selectedTable = table;
      saveState();
      renderTableSelect();
    }

    // Override showScreen to render on show
    const _origShowScreen = showScreen;
    showScreen = function(id) {
      if (id !== 'battle-screen') battleAbort?.abort();
      if (id === 'collection-screen') renderCollection();
      if (id === 'table-screen') renderTableSelect();
      if (id === 'shop-screen') renderShop();
      if (id === 'title-screen') updateTitleScreen();
      if (id === 'learn-screen') renderLearnScreen();
      if (id === 'parent-screen') renderParentScreen();
      if (id === 'challenge-screen') renderChallengeScreen();
      _origShowScreen(id);
    };



    let battleAbort = null;

    function renderBattle() {
      const monster = getActiveMonster();
      state.battle.enemy = getEnemy(state.level, state.selectedTable);
      state.battle.playerHp = monster.hp;
      state.battle.playerMaxHp = monster.hp;

      const isBoss = state.battle.enemy.isBoss;

      // Boss splash screen
      if (isBoss) {
        document.getElementById('battle-screen').innerHTML = `
          <div class="boss-splash">
            <div class="boss-emoji">${state.battle.enemy.emoji}</div>
            <div class="boss-title">BOSS BATTLE!</div>
            <div class="boss-subtitle">A powerful enemy approaches...</div>
          </div>`;
        setTimeout(() => { if (battleAbort?.signal.aborted) return; renderBattleScreen(); }, 2000);
        return;
      }

      renderBattleScreen();
    }

    function renderBattleScreen() {
      const monster = getActiveMonster();
      const isBoss = state.battle.enemy.isBoss;
      // Apply cosmetic background
      const bgItem = SHOP_ITEMS.find(i => i.id === 'bg-' + state.shop.background);

      // Apply cosmetic hat to player monster

      const hatHtml = hatItem ? '<span style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:24px">' + hatItem.overlay + '</span>' : '';
      document.getElementById('battle-screen').innerHTML = `
        <div class="battle-topbar">
          <span>Level ${state.level}${isBoss ? ' BOSS' : ''}</span>
          <span class="coins">\u{1FA99} ${state.coins}</span>
          <span style="cursor:pointer;text-decoration:underline" onclick="showScreen('table-screen')">x${state.selectedTable} Table \u{25B6}</span>
        </div>
        <div class="battle-area" style="${battleBg ? 'background:' + battleBg + ';' : ''}">
          <div id="streak-counter" class="streak-counter"></div>
          <div class="monster-slot" id="player-slot">
            <div style="position:relative;display:inline-block">
              ${hatHtml}<span class="monster-emoji player-monster">${monster.emoji}</span>
            </div>
            <div class="monster-name" style="color:#4CAF50">${monster.name}</div>
            <div class="hp-bar"><div class="hp-fill player" id="player-hp" style="width:100%"></div></div>
          </div>
          <div class="vs-text">VS</div>
          <div class="monster-slot" id="enemy-slot">
            <div class="${isBoss ? 'boss-border' : ''}">
              <span class="monster-emoji enemy-monster${isBoss ? ' boss' : ''}">${state.battle.enemy.emoji}</span>
            </div>
            <div class="monster-name" style="color:#9C27B0">${state.battle.enemy.name}${isBoss ? ' BOSS' : ''}</div>
            <div class="hp-bar"><div class="hp-fill enemy" id="enemy-hp" style="width:100%"></div></div>

          <div id="array-display" class="array-display"></div>
        </div>
      `;
      nextQuestion();
    }

    function getActiveMonster() {
      const def = MONSTER_REGISTRY[state.selectedMonster];
      const owned = state.monsters.find(m => m.id === state.selectedMonster);
      const hp = owned && owned.evolved ? Math.floor(def.hp * 1.5) : def.hp;
      const atk = owned && owned.evolved ? Math.floor(def.attack * 1.5) : def.attack;
      const emoji = owned && owned.evolved ? def.evolveEmoji : def.emoji;
      const name = owned && owned.evolved ? def.evolveName : def.name;
      return { ...def, hp, attack: atk, emoji, name };
    }

    function nextQuestion() {
      state.battle.question = generateQuestion(state.selectedTable);
      document.getElementById('question-text').textContent =
        `${state.battle.question.table} x ${state.battle.question.a} = ?`;
      const container = document.getElementById('answer-options');
      container.innerHTML = state.battle.question.options.map(opt =>
        `<button class="answer-btn" onclick="submitAnswer(${opt})">${opt}</button>`
      ).join('');
      // Clear feedback and array from previous question
      const fb = document.getElementById('feedback-panel');
      if (fb) fb.textContent = '';
      const arr = document.getElementById('array-display');
      if (arr) arr.innerHTML = '';
      // Focus first answer button for keyboard navigation
      const firstBtn = container.querySelector('.answer-btn');
      if (firstBtn) firstBtn.focus();
    }

    function submitAnswer(choice) {
      if (state.battle.processing) return;
      state.battle.processing = true;
      const btns = document.querySelectorAll('.answer-btn');
      btns.forEach(b => b.disabled = true);

      const q = state.battle.question;
      const isCorrect = choice === q.correct;
      const playerMonster = document.getElementById('player-slot');
      const enemyMonster = document.getElementById('enemy-slot');

      // Feature 4: update fact stats
      if (!state.factStats[q.table]) state.factStats[q.table] = { correct: 0, total: 0 };
      state.factStats[q.table].total++;

      if (isCorrect) {
        state.factStats[q.table].correct++;
        state.streak++;
        // Feature 5: update best streak
        if (state.streak > state.bestStreak) {
          state.bestStreak = state.streak;
          updateTitleScreen();
        }
        updateStreakDisplay();
        const dmg = getActiveMonster().attack;
        state.battle.enemy.hp -= dmg;
        // Animate player attack
        playerMonster.style.animation = 'attackRight 0.3s ease';
        setTimeout(() => { if (battleAbort?.signal.aborted) return; playerMonster.style.animation = ''; }, 300);
        // Show damage (with cosmetic effect prefix)
        const fxItem = SHOP_ITEMS.find(i => i.id === 'fx-' + state.shop.effect);
        const fxPrefix = (state.shop.effect !== 'default' && fxItem) ? fxItem.prefix + ' ' : '';
        const attackWords = ['POW!', 'ZAP!', 'WHAM!', 'BAM!', 'BOOM!'];
        const hitWord = fxPrefix + attackWords[Math.floor(Math.random() * attackWords.length)];
        showDamageText(enemyMonster, hitWord, '#FFD700');
        const enemyEmoji = enemyMonster.querySelector('.monster-emoji');
        if (enemyEmoji) { enemyEmoji.classList.add('hit-flash'); setTimeout(() => { if (battleAbort?.signal.aborted) return; enemyEmoji.classList.remove('hit-flash'); }, 200); }
        // Screen shake on boss hit
        if (state.battle.enemy.isBoss) {
          const battleEl = document.getElementById('battle-screen');
          battleEl.classList.add('screen-shake');
          setTimeout(() => battleEl.classList.remove('screen-shake'), 200);
        }

        // Update enemy HP
        const pct = Math.max(0, state.battle.enemy.hp / state.battle.enemy.maxHp * 100);
        const enemyHpFill = document.getElementById('enemy-hp');
        enemyHpFill.style.width = pct + '%';
        if (pct < 30) enemyHpFill.classList.add('low');
        else enemyHpFill.classList.remove('low');

        // Highlight correct
        btns.forEach(b => {
          if (parseInt(b.textContent) === q.correct) b.classList.add('correct');
        });

        // Feature 2: show dot array after correct answer
        renderArray(q.table, q.a);

        if (state.battle.enemy.hp <= 0) {
          setTimeout(() => { if (battleAbort?.signal.aborted) return; state.battle.processing = false; winBattle(); }, 600);
        } else {
          setTimeout(() => { if (battleAbort?.signal.aborted) return; state.battle.processing = false; nextQuestion(); }, 800);
        }
      } else {
        // Feature 1: show feedback explanation on wrong answer
        const fb = document.getElementById('feedback-panel');
        if (fb) fb.textContent = q.table + ' x ' + q.a + ' means ' + q.table + ' groups of ' + q.a + ' = ' + q.correct;
        // Feature 3: track fact errors for spaced repetition
        const errorKey = q.table + '_' + q.a;
        state.factErrors[errorKey] = (state.factErrors[errorKey] || 0) + 1;

        state.streak = 0;
        updateStreakDisplay();
        const dmg = Math.floor(state.battle.enemy.attack);
        state.battle.playerHp -= dmg;
        // Animate enemy attack
        enemyMonster.style.animation = 'attackLeft 0.3s ease';
        setTimeout(() => { if (battleAbort?.signal.aborted) return; enemyMonster.style.animation = ''; }, 300);
        showDamageText(playerMonster, 'OUCH!', '#f44336');
        const playerEmoji = playerMonster.querySelector('.monster-emoji');
        if (playerEmoji) { playerEmoji.classList.add('hit-flash'); setTimeout(() => { if (battleAbort?.signal.aborted) return; playerEmoji.classList.remove('hit-flash'); }, 200); }

        // Update player HP
        const pct = Math.max(0, state.battle.playerHp / state.battle.playerMaxHp * 100);
        const playerHpFill = document.getElementById('player-hp');
        playerHpFill.style.width = pct + '%';
        if (pct < 30) playerHpFill.classList.add('low');
        else playerHpFill.classList.remove('low');

        // Highlight wrong + show correct answer longer for learning
        btns.forEach(b => {
          if (parseInt(b.textContent) === choice) b.classList.add('wrong');
          if (parseInt(b.textContent) === q.correct) b.classList.add('correct');
        });

        const delay = state.battle.playerHp <= 0 ? 1500 : 1500;
        if (state.battle.playerHp <= 0) {
          setTimeout(() => { if (battleAbort?.signal.aborted) return; state.battle.processing = false; loseBattle(); }, delay);
        } else {
          setTimeout(() => { if (battleAbort?.signal.aborted) return; state.battle.processing = false; nextQuestion(); }, delay);
        }
      }
      saveState();
    }

    function updateStreakDisplay() {
      const el = document.getElementById('streak-counter');
      if (!el) return;
      if (state.streak >= 3) {
        el.textContent = state.streak + 'x Streak! 🔥';
        el.classList.add('visible');
      } else {
        el.classList.remove('visible');
      }
    }

    function showDamageText(parent, text, color) {
      const el = document.createElement('div');
      el.textContent = text;
      el.style.cssText = `position:absolute;font-size:28px;font-weight:bold;color:${color};text-shadow:1px 1px 0 #000;pointer-events:none;animation:floatUp 0.8s ease forwards;z-index:10;`;
      parent.style.position = 'relative';
      parent.appendChild(el);
      setTimeout(() => { if (battleAbort?.signal.aborted) return; el.remove(); }, 800);
    }

    function winBattle() {
      let coinsEarned = state.battle.enemy.isBoss ? 25 : 10;
      // Feature 6: daily challenge 3x coins
      if (state.battle.isDaily) coinsEarned *= 3;
      const streakBonus = state.streak >= 3 ? (state.streak - 2) * 5 : 0;
      state.coins += coinsEarned + streakBonus;

      // Check monster unlocks
      if (state.battle.enemy.isBoss) {
        const unlockable = MONSTER_REGISTRY.find(m => m.unlockLevel === state.level && !state.unlockedMonsters.includes(m.id));
        if (unlockable) {
          state.unlockedMonsters.push(unlockable.id);
          state.monsters.push({ id: unlockable.id, name: unlockable.name, battles: 0, evolved: false });
        }
      }

      // Track battles for active monster
      const owned = state.monsters.find(m => m.id === state.selectedMonster);
      if (owned) {
        owned.battles++;
        if (owned.battles >= MONSTER_REGISTRY[state.selectedMonster].evolveLevel && !owned.evolved) {
          owned.evolved = true;
        }
      }

      state.level++;
      // Feature 6: mark daily as done
      if (state.battle.isDaily) {
        state.lastDailyDate = new Date().toISOString().slice(0, 10);
        state.battle.isDaily = false;
      }
      saveState();

      const msg = WIN_MESSAGES[Math.floor(Math.random() * WIN_MESSAGES.length)];
      document.getElementById('battle-screen').innerHTML = `
        <div class="win-screen">
          <div class="result-emoji">\u{1F3C6}</div>
          <div class="result-title">YOU WIN!</div>
          <div class="result-msg">${msg}</div>
          <div class="result-coins">\u{1FA99} +${coinsEarned}${streakBonus > 0 ? ` (+${streakBonus} streak!)` : ''}</div>
          <button class="btn btn-primary" onclick="renderBattle()">Next Battle</button>
        </div>
      `;
    }

    function loseBattle() {
      // Feature 6: mark daily as done even on loss
      if (state.battle.isDaily) {
        state.lastDailyDate = new Date().toISOString().slice(0, 10);
        state.battle.isDaily = false;
        saveState();
      }
      const msg = LOSE_MESSAGES[Math.floor(Math.random() * LOSE_MESSAGES.length)];
      document.getElementById('battle-screen').innerHTML = `
        <div class="lose-screen">
          <div class="result-emoji">\u{1F622}</div>
          <div class="result-title">OH NO!</div>
          <div class="result-msg">${msg}</div>
          <button class="btn btn-primary" onclick="renderBattle()">Try Again</button>
          <button class="btn btn-secondary" onclick="showScreen('title-screen')">Home</button>
        </div>
      `;
    }

    // Feature 2: render dot array for multiplication visual
    function renderArray(table, a) {
      const arr = document.getElementById('array-display');
      if (!arr) return;
      let html = '';
      for (let row = 0; row < table; row++) {
        html += '<div class="array-row">';
        for (let col = 0; col < a; col++) {
          const delay = (row * a + col) * 40;
          html += '<div class="array-dot" style="animation-delay:' + delay + 'ms"></div>';
        }
        html += '</div>';
      }
      arr.innerHTML = html;
    }


    function renderShop() {
      const categories = [
        { key: 'background', label: 'Battle Backgrounds' },
        { key: 'effect', label: 'Attack Effects' },
        { key: 'hat', label: 'Monster Hats' }
      ];
      let html = `
        <div class="collection-header">
          <button class="btn btn-back" onclick="showScreen('title-screen')">Back</button>
          <h2>\u{1F6D2} Shop</h2>
          <span style="color:#FFD700">\u{1FA99} ${state.coins}</span>
        </div>
      `;

      categories.forEach(cat => {
        const items = SHOP_ITEMS.filter(i => i.category === cat.key);
        html += '<div class="shop-section-title">' + cat.label + '</div>';
        html += '<div class="shop-grid">';
        items.forEach(item => {
          const owned = state.ownedItems.includes(item.id);
          const active = (cat.key === 'background' && state.shop.background === item.id.replace('bg-', '')) ||
                         (cat.key === 'effect' && state.shop.effect === item.id.replace('fx-', '')) ||
                         (cat.key === 'hat' && state.shop.hat === item.id.replace('hat-', ''));
          const cssClass = owned ? (active ? 'shop-item owned active' : 'shop-item owned') : 'shop-item';
          const action = owned ? 'equipShopItem' : 'buyShopItem';
          html += `
            <button class="${cssClass}" onclick="${action}('${item.id}')">
              <div class="s-emoji">${item.emoji}</div>
              <div class="s-name">${item.name}</div>
              ${owned
                ? (active ? '<div class="s-owned">Equipped \u{2713}</div>' : '<div class="s-owned">Owned \u{2713}</div>')
                : '<div class="s-price">BUY \u{1FA99} ' + item.price + '</div>'
              }
            </button>`;
        });
        html += '</div>';
      });

      document.getElementById('shop-screen').innerHTML = html;
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    function buyShopItem(id) {
      const item = SHOP_ITEMS.find(i => i.id === id);
      if (!item || state.ownedItems.includes(id)) return;
      if (state.coins < item.price) { showToast("Not enough coins!"); return; }
      state.coins -= item.price;
      state.ownedItems.push(id);
      equipShopItem(id);
      saveState();
    }

    function equipShopItem(id) {
      const item = SHOP_ITEMS.find(i => i.id === id);
      if (!item || !state.ownedItems.includes(id)) return;
      if (item.category === 'background') state.shop.background = id.replace('bg-', '');
      if (item.category === 'effect') state.shop.effect = id.replace('fx-', '');
      if (item.category === 'hat') state.shop.hat = id.replace('hat-', '');
      saveState();
      renderShop();
    }

    // Feature 5+6: update title screen with best streak and daily button state
    function updateTitleScreen() {
      const el = document.getElementById('best-streak-display');
      if (el) el.textContent = state.bestStreak > 0 ? 'Your Best Streak: ' + state.bestStreak : '';
      // Feature 6: daily challenge button state
      const dailyBtn = document.getElementById('daily-btn');
      if (dailyBtn) {
        const today = new Date().toISOString().slice(0, 10);
        if (state.lastDailyDate === today) {
          dailyBtn.disabled = true;
          dailyBtn.textContent = 'Daily Challenge — Come back tomorrow!';
        } else {
          dailyBtn.disabled = false;
          dailyBtn.textContent = 'Daily Challenge';
        }
      }
    }

    // Feature 6: daily challenge
    function startDailyChallenge() {
      const today = new Date().toISOString().slice(0, 10);
      if (state.lastDailyDate === today) return;
      battleAbort = new AbortController();
      // Create a boss-level daily enemy with crown emoji, 2x HP
      state.battle.enemy = getEnemy(state.level, state.selectedTable);
      state.battle.enemy.emoji = '\u{1F451}';
      state.battle.enemy.name = 'Daily Boss';
      state.battle.enemy.isBoss = true;
      state.battle.enemy.hp *= 2;
      state.battle.enemy.maxHp = state.battle.enemy.hp;
      state.battle.isDaily = true;
      const monster = getActiveMonster();
      state.battle.playerHp = monster.hp;
      state.battle.playerMaxHp = monster.hp;
      // Show boss splash then battle
      document.getElementById('battle-screen').innerHTML = '<div class="boss-splash"><div class="boss-emoji">\u{1F451}</div><div class="boss-title">DAILY CHALLENGE!</div><div class="boss-subtitle">3x Coin Reward!</div></div>';
      showScreen('battle-screen');
      setTimeout(() => { if (battleAbort?.signal.aborted) return; renderBattleScreen(); }, 2000);
    }

    function startBattle() {
      battleAbort = new AbortController();
      renderBattle();
      showScreen('battle-screen');
    }

    // ========== FEATURE 1: Learn Mode (Number Sense) ==========

    let learnFact = { table: 1, multiplier: 1 };
    let learnAnimating = false;

    function renderLearnScreen() {
      if (!state.learnTable) state.learnTable = state.selectedTable;
      learnFact.table = state.learnTable;
      learnFact.multiplier = Math.floor(Math.random() * 12) + 1;
      updateLearnTableLabel();
      drawLearnFact();
      drawLearnGroups(true);
    }

    function updateLearnTableLabel() {
      document.getElementById('learn-table-label').textContent = 'Table x' + state.learnTable;
    }

    function changeLearnTable(dir) {
      state.learnTable = state.learnTable + dir;
      if (state.learnTable < 1) state.learnTable = 12;
      if (state.learnTable > 12) state.learnTable = 1;
      updateLearnTableLabel();
      learnNextFact();
    }

    function drawLearnFact() {
      const el = document.getElementById('learn-fact-display');
      el.innerHTML = learnFact.table + ' x ' + learnFact.multiplier + ' <span id="learn-answer" style="color:rgba(255,255,255,0.2)">?</span>';
      document.getElementById('learn-build-btn').disabled = false;
    }

    function drawLearnGroups(empty) {
      const el = document.getElementById('learn-groups');
      let html = '';
      for (let row = 0; row < learnFact.table; row++) {
        html += '<div class="learn-group-row" style="' + (empty ? 'opacity:1;transform:none;animation:none' : '') + '">';
        for (let col = 0; col < learnFact.multiplier; col++) {
          if (empty) {
            html += '<div class="learn-dot-placeholder"></div>';
          } else {
            html += '<div class="learn-dot"></div>';
          }
        }
        html += '</div>';
      }
      el.innerHTML = html;
    }

    function learnBuild() {
      if (learnAnimating) return;
      learnAnimating = true;
      const el = document.getElementById('learn-groups');
      const total = learnFact.table;
      let current = 0;

      function showNextRow() {
        if (current >= total) {
          learnAnimating = false;
          // Reveal answer
          const answer = learnFact.table * learnFact.multiplier;
          document.getElementById('learn-answer').innerHTML = '<span class="answer-reveal">' + answer + '</span>';
          document.getElementById('learn-build-btn').disabled = true;
          return;
        }
        const row = el.children[current];
        if (row) {
          row.style.animation = 'rowAppear 0.3s ease forwards';
        }
        current++;
        setTimeout(showNextRow, 200);
      }
      showNextRow();
    }

    function learnNextFact() {
      learnFact.table = state.learnTable;
      learnFact.multiplier = Math.floor(Math.random() * 12) + 1;
      learnAnimating = false;
      drawLearnFact();
      drawLearnGroups(true);
    }

      overlay.className = 'modal-overlay';

        <div class="modal-box">
          <h3>Parent Access</h3>
          <p>Solve: 17 x 23 = ?</p>

          <div class="modal-error" id="parent-gate-error"></div>

            <button class="btn btn-cancel" onclick="closeParentGate()">Cancel</button>
            <button class="btn btn-primary" onclick="checkParentGate()">Unlock</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      setTimeout(() => document.getElementById('parent-gate-input')?.focus(), 100);

    function closeParentGate() {
      document.getElementById('parent-gate-modal')?.remove();
    }

    function checkParentGate() {
      const val = parseInt(document.getElementById('parent-gate-input').value);
      if (val === 391) {
        closeParentGate();
        showScreen('parent-screen');
      } else {
        document.getElementById('parent-gate-error').textContent = 'Incorrect. Try again.';

    function renderParentScreen() {
      const el = document.getElementById('parent-content');
      let html = '';

      // Summary stats
      let totalAnswered = 0, totalCorrect = 0;
      Object.values(state.factStats).forEach(s => { totalAnswered += s.total; totalCorrect += s.correct; });
      const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;

      // Days played
      let daysPlayed = 1;
      if (state.firstPlayDate) {
        const diff = Date.now() - new Date(state.firstPlayDate).getTime();
        daysPlayed = Math.max(1, Math.floor(diff / 86400000) + 1);
      }

      html += `
        <div class="parent-stat-grid">
          <div class="parent-stat">
            <div class="stat-value">${totalAnswered}</div>
            <div class="stat-label">Questions Answered</div>
          </div>
          <div class="parent-stat">
            <div class="stat-value">${accuracy}%</div>
            <div class="stat-label">Overall Accuracy</div>
          </div>
          <div class="parent-stat">
            <div class="stat-value">${state.streak} / ${state.bestStreak}</div>
            <div class="stat-label">Current / Best Streak</div>
          </div>
          <div class="parent-stat">
            <div class="stat-value">Lv.${state.level}</div>
            <div class="stat-label">Level Reached</div>
          </div>
          <div class="parent-stat">
            <div class="stat-value">${state.coins}</div>
            <div class="stat-label">Coins Earned</div>
          </div>
          <div class="parent-stat">
            <div class="stat-value">${daysPlayed}</div>
            <div class="stat-label">Days Played</div>
          </div>
        </div>
      `;

      // Accuracy by table
      const tablesWithData = TABLE_ORDER.filter(t => state.factStats[t]);
      if (tablesWithData.length > 0) {
        html += '<div class="parent-section-title">Accuracy by Table</div>';
        tablesWithData.forEach(t => {
          const s = state.factStats[t];
          const pct = Math.round((s.correct / s.total) * 100);
          const cls = pct >= 80 ? 'good' : pct >= 60 ? 'mid' : 'low';
          html += `
            <div class="progress-bar-row">
              <span>x${t}</span>
              <div class="progress-bar-track"><div class="progress-bar-fill ${cls}" style="width:${pct}%"></div></div>
              <span>${pct}%</span>
            </div>`;
        });
      }

      // Missed facts
      const errorEntries = Object.entries(state.factErrors)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);
      if (errorEntries.length > 0) {
        html += '<div class="parent-section-title" style="margin-top:20px">Facts to Practice</div>';
        html += '<ul class="missed-fact-list">';
        errorEntries.forEach(([key, count]) => {
          const [table, mult] = key.split('_');
          html += `<li><span>${table} x ${mult} = ${table * mult}</span><span class="miss-count">Missed ${count}x</span></li>`;
        });
        html += '</ul>';
      }

      if (totalAnswered === 0) {
        html += '<div style="text-align:center;color:#888;margin-top:40px;font-size:16px">No data yet. Start battling to see progress!</div>';
      }

      el.innerHTML = html;
    }

    // ========== FEATURE 3: Challenge a Friend ==========

    function generateChallengeCode() {
      const seed = Math.floor(Math.random() * 999999);
      return seed.toString().padStart(6, '0');
    }

    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    let challengeState = { active: false, code: '', wins: 0, battle: 0, totalBattles: 5, rng: null };

    function showChallengeModal() {
      const code = generateChallengeCode();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'challenge-modal';
      overlay.innerHTML = `
        <div class="modal-box">
          <h3>Challenge Code</h3>
          <p>Share this code with a friend!</p>
          <div style="font-size:36px;font-weight:bold;letter-spacing:6px;color:var(--gold);margin:16px 0;font-family:monospace">${code}</div>
          <div class="modal-btns">
            <button class="btn btn-cancel" onclick="document.getElementById('challenge-modal').remove()">Close</button>
            <button class="btn btn-primary" onclick="copyChallengeCode('${code}')">Copy</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function copyChallengeCode(code) {
      navigator.clipboard?.writeText(code).then(() => {
        const btn = document.querySelector('#challenge-modal .btn-primary');
        if (btn) btn.textContent = 'Copied!';
        setTimeout(() => document.getElementById('challenge-modal')?.remove(), 800);
      }).catch(() => {
        // Fallback: select text
        const input = document.createElement('input');
        input.value = code;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        input.remove();
        document.getElementById('challenge-modal')?.remove();
      });
    }

    function joinChallenge() {
      const input = document.getElementById('challenge-code-input');
      const code = input?.value?.trim();
      if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) return;
      startChallengeFromCode(code);
    }

    function startChallengeFromCode(code) {
      const seed = parseInt(code);
      challengeState = {
        active: true,
        code: code,
        wins: 0,
        battle: 0,
        totalBattles: 5,
        rng: mulberry32(seed)
      };
      showScreen('challenge-screen');
      renderChallengeScreen();
    }

    function renderChallengeScreen() {
      if (!challengeState.active) {
        // No active challenge — show the entry screen
        document.getElementById('challenge-screen').innerHTML = `
          <div class="learn-topbar">
            <button class="btn btn-back" onclick="showScreen('title-screen')">Back</button>
            <h2>Challenge</h2>
            <span></span>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px">
            <div style="font-size:48px">&#9876;&#65039;</div>
            <h2 style="text-align:center">Challenge a Friend</h2>
            <p style="color:#aaa;text-align:center;max-width:280px">Generate a code and share it. Your friend enters it to play the same 5-battle gauntlet!</p>
            <button class="btn btn-challenge" onclick="showChallengeModal()">Generate Code</button>
          </div>
        `;
        return;
      }

      // Render challenge battle
      if (challengeState.battle >= challengeState.totalBattles) {
        // Show summary
        document.getElementById('challenge-screen').innerHTML = `
          <div class="challenge-summary">
            <div style="font-size:64px;margin-bottom:16px">${challengeState.wins >= 3 ? '&#127942;' : '&#128170;'}</div>
            <h2>Challenge Complete!</h2>
            <div class="result-score">${challengeState.wins} / ${challengeState.totalBattles}</div>
            <p style="color:#aaa;font-size:18px;margin-bottom:24px">${challengeState.wins >= 3 ? 'You won the challenge!' : 'Almost! Try again!'}</p>
            <button class="btn btn-primary" onclick="challengeState.active=false;showScreen('title-screen')">Home</button>
          </div>
        `;
        return;
      }

      // Generate the next challenge enemy from the seeded RNG
      const rng = challengeState.rng;
      const mult = Math.floor(rng() * 12) + 1;
      const correctAnswer = state.selectedTable * mult;

      // Generate wrong answers using seeded rng
      const wrongs = new Set();
      while (wrongs.size < 2) {
        const offset = Math.floor(rng() * 9) - 4;
        const wrong = correctAnswer + offset;
        if (wrong !== correctAnswer && wrong > 0 && !wrongs.has(wrong)) {
          wrongs.add(wrong);
        }
      }
      const options = [correctAnswer, ...wrongs];
      // Shuffle with seeded rng
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }

      const theme = MONSTER_ENEMY_POOL.byTable[state.selectedTable] || MONSTER_ENEMY_POOL.default;
      const enemyIdx = Math.floor(rng() * theme.emoji.length);
      const enemyName = theme.names[enemyIdx];
      const enemyEmoji = theme.emoji[enemyIdx];

      // Build progress pips
      let pipsHtml = '';
      for (let i = 0; i < challengeState.totalBattles; i++) {
        let cls = 'challenge-pip';
        if (i < challengeState.battle) cls += challengeState.wins > i ? ' win' : ' loss';
        if (i === challengeState.battle) cls += ' current';
        const label = i < challengeState.battle ? (challengeState.wins > i ? 'W' : 'L') : (i + 1);
        pipsHtml += `<div class="${cls}">${label}</div>`;
      }

      const monster = getActiveMonster();

      document.getElementById('challenge-screen').innerHTML = `
        <div class="challenge-banner">
          &#9876;&#65039; CHALLENGE MODE &#9876;&#65039; Battle ${challengeState.battle + 1} of ${challengeState.totalBattles}
        </div>
        <div class="challenge-progress">${pipsHtml}</div>
        <div class="battle-area">
          <div class="monster-slot">
            <span class="monster-emoji">${monster.emoji}</span>
            <div class="monster-name" style="color:#4CAF50">${monster.name}</div>
          </div>
          <div class="vs-text">VS</div>
          <div class="monster-slot">
            <span class="monster-emoji">${enemyEmoji}</span>
            <div class="monster-name" style="color:#9C27B0">${enemyName}</div>
          </div>
        </div>
        <div class="question-panel" id="challenge-question-panel">
          <div class="question-text">${state.selectedTable} x ${mult} = ?</div>
          <div class="answer-options" id="challenge-options">
            ${options.map(opt => `<button class="answer-btn" onclick="submitChallengeAnswer(${opt},${correctAnswer})">${opt}</button>`).join('')}
          </div>
        </div>
      `;
    }

    function submitChallengeAnswer(choice, correctAnswer) {
      const btns = document.querySelectorAll('#challenge-options .answer-btn');
      btns.forEach(b => b.disabled = true);

      btns.forEach(b => {
        if (parseInt(b.textContent) === correctAnswer) b.classList.add('correct');
        if (parseInt(b.textContent) === choice && choice !== correctAnswer) b.classList.add('wrong');
      });

      if (choice === correctAnswer) {
        challengeState.wins++;
      }
      challengeState.battle++;

      setTimeout(() => renderChallengeScreen(), 1200);
    }

    // Initialize challenge screen on load (in case it's active)
    if (challengeState.active) {
      showScreen('challenge-screen');
    }
  </script>
</body>
</html>
