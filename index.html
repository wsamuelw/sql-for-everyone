<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL for Everyone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== CSS Variables ========== */
    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

      /* Light theme (default) */
      --bg: #ffffff;
      --surface: #f8f9fa;
      --surface2: #e9ecef;
      --border: #dee2e6;
      --text: #212529;
      --text-dim: #6c757d;
      --accent: #4a6ae0;
      --green: #22c55e;
      --orange: #fb923c;
      --red: #f87171;
      --yellow: #facc15;
      --pink: #f472b6;
      --cyan: #22d3ee;
    }

    [data-theme="dark"] {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232736;
      --border: #2d3148;
      --text: #e2e4ef;
      --text-dim: #8b8fa8;
      --accent: #4a6ae0;
      --green: #22c55e;
      --orange: #fb923c;
      --red: #f87171;
      --yellow: #facc15;
      --pink: #f472b6;
      --cyan: #22d3ee;
    }

    /* ========== Reset & Base ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }

    /* ========== Layout ========== */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 50;
      transition: background 0.3s;
    }

    .sidebar-logo {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .sidebar-logo .subtitle {
      font-size: 12px;
      color: var(--text-dim);
    }

    .lesson-nav {
      list-style: none;
      flex: 1;
      padding: 8px 0;
      overflow-y: auto;
    }

    .lesson-nav li {
      padding: 10px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      font-size: 14px;
      color: var(--text-dim);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lesson-nav li:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .lesson-nav li.active {
      border-left-color: var(--accent);
      color: var(--text);
      background: var(--bg);
      font-weight: 500;
    }

    .lesson-nav li .num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .lesson-nav li.active .num {
      background: var(--accent);
      color: #fff;
    }

    .lesson-nav li.completed .num {
      background: var(--green);
      color: #fff;
    }

    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }

    .theme-toggle {
      width: 100%;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-dim);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-toggle:hover {
      background: var(--surface2);
      color: var(--text);
    }

    /* ========== Main Content ========== */
    .main {
      padding: 40px 48px;
      max-width: 960px;
      position: relative;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 280px;
      right: 0;
      height: 3px;
      background: var(--surface2);
      z-index: 60;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--pink));
      border-radius: 0 2px 2px 0;
      transition: width 0.4s ease;
    }

    /* ========== Lesson Content ========== */
    .lesson h2 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .lesson .subtitle {
      color: var(--text-dim);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .lesson h3 {
      font-size: 18px;
      font-weight: 600;
      margin: 28px 0 12px;
      color: var(--text);
    }

    .lesson p {
      margin-bottom: 16px;
      line-height: 1.7;
    }

    /* ========== Concept Boxes ========== */
    .concept-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
      position: relative;
    }

    .concept-box::before {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .concept-box.analogy {
      border-left: 3px solid var(--yellow);
    }

    .concept-box.analogy::before {
      content: "\1F4A1  Think of it like this";
    }

    .concept-box.why {
      border-left: 3px solid var(--cyan);
    }

    .concept-box.why::before {
      content: "\1F3AF  Why this matters";
    }

    .concept-box.tip {
      border-left: 3px solid var(--green);
    }

    .concept-box.tip::before {
      content: "\2705  Pro tip";
    }

    .concept-box.warning {
      border-left: 3px solid var(--orange);
    }

    .concept-box.warning::before {
      content: "\26A0\FE0F  Watch out";
    }

    /* ========== Code Blocks ========== */
    .code-block {
      background: #0d0f14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      color: #e2e4ef;
      overflow-x: auto;
      margin-bottom: 20px;
      white-space: pre;
    }

    /* ========== Playground ========== */
    .playground {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .playground-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface2);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .playground textarea {
      width: 100%;
      min-height: 100px;
      background: #0d0f14;
      color: #e2e4ef;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      padding: 16px 20px;
      border: none;
      resize: vertical;
      outline: none;
    }

    .playground textarea::placeholder {
      color: #555;
    }

    .playground-actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    /* ========== Buttons ========== */
    .btn {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-run {
      background: var(--green);
      color: #000;
    }

    .btn-run:hover {
      filter: brightness(1.1);
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .btn-reset:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-hint {
      background: transparent;
      border: 1px solid rgba(250, 204, 21, 0.3);
      color: var(--yellow);
    }

    .btn-hint:hover {
      background: rgba(250, 204, 21, 0.1);
    }

    /* ========== Result Area ========== */
    .result-area {
      border-top: 1px solid var(--border);
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 13px;
    }

    .result-table th {
      background: var(--surface2);
      color: var(--accent);
      padding: 8px 14px;
      text-align: left;
      font-weight: 600;
    }

    .result-table td {
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .result-table tr:nth-child(even) td {
      background: var(--surface);
    }

    .result-table tr:hover td {
      background: var(--surface2);
    }

    .result-table .null-val {
      color: var(--text-dim);
      font-style: italic;
    }

    .result-meta {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ========== Exercise ========== */
    .exercise {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .challenge-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .challenge-badge.easy {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }

    .challenge-badge.medium {
      background: rgba(250, 204, 21, 0.15);
      color: var(--yellow);
    }

    .challenge-badge.hard {
      background: rgba(248, 113, 113, 0.15);
      color: var(--red);
    }

    /* ========== Navigation Buttons ========== */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn-nav {
      padding: 10px 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-nav:hover {
      background: var(--surface);
      color: var(--text);
    }

    .btn-nav.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-nav.primary:hover {
      filter: brightness(1.1);
    }

    /* ========== Schema Display ========== */
    .schema-display {
      background: #0d0f14;
      font-family: var(--mono);
      font-size: 13px;
      padding: 16px;
      border-radius: 8px;
      color: #e2e4ef;
      overflow-x: auto;
      margin-bottom: 20px;
      white-space: pre;
    }

    /* ========== Scrollbar Styling ========== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    /* ========== Mobile Toggle ========== */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 70;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    /* ========== Animation ========== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lesson {
      animation: fadeIn 0.3s ease;
    }

    /* ========== Responsive ========== */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        width: 100%;
      }

      .sidebar.open {
        display: flex;
      }

      .mobile-toggle {
        display: flex;
      }

      .main {
        padding: 24px 16px;
      }

      .progress-bar {
        left: 0;
      }
    }
  </style>
</head>

    function translateSQL(sql) {
      let translated = sql;

      // DATE_TRUNC('month', col) → strftime('%Y-%m', col)
      translated = translated.replace(
        /DATE_TRUNC\s*\(\s*'month'\s*,\s*([^)]+)\)/gi,
        "strftime('%Y-%m', $1)"
      );

      // DATE_TRUNC('year', col) → strftime('%Y', col)
      translated = translated.replace(
        /DATE_TRUNC\s*\(\s*'year'\s*,\s*([^)]+)\)/gi,
        "strftime('%Y', $1)"
      );

      // DATE_TRUNC('day', col) → date(col)
      translated = translated.replace(
        /DATE_TRUNC\s*\(\s*'day'\s*,\s*([^)]+)\)/gi,
        "date($1)"
      );

      // DATEADD('day', N, col) → date(col, '+N days')
      translated = translated.replace(
        /DATEADD\s*\(\s*'day'\s*,\s*(\d+)\s*,\s*([^)]+)\)/gi,
        "date($2, '+$1 days')"
      );

      // DATEADD('month', N, col) → date(col, '+N months')
      translated = translated.replace(
        /DATEADD\s*\(\s*'month'\s*,\s*(\d+)\s*,\s*([^)]+)\)/gi,
        "date($2, '+$1 months')"
      );

      // DATEDIFF('day', start, end) → julianday(end) - julianday(start)
      translated = translated.replace(
        /DATEDIFF\s*\(\s*'day'\s*,\s*([^,]+)\s*,\s*([^)]+)\)/gi,
        "CAST(julianday($2) - julianday($1) AS INTEGER)"
      );

      // CURRENT_DATE() → date('now')
      translated = translated.replace(/CURRENT_DATE\s*\(\s*\)/gi, "date('now')");

      // ILIKE → LIKE (SQLite is case-insensitive by default)
      translated = translated.replace(/\bILIKE\b/gi, 'LIKE');

      return translated;
    }

    function executeQuery(sql) {
      const translated = translateSQL(sql);
      return db.exec(translated);
    }

    initDatabase().then(() => {
      // Ready -- renderLesson() will be added in Task 5
      console.log('Database ready. Tables:', db.exec("SELECT name FROM sqlite_master WHERE type='table'"));
    }).catch(err => {
      console.error('Failed to initialize database:', err);
    });
  </script>
</body>
