<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL for Everyone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== CSS Variables ========== */
    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'SFMono-Regular', 'Cascadia Code', 'Fira Code', monospace;

      /* Clean Light theme */
      --bg: #ffffff;
      --surface: #fafafa;
      --surface2: #f5f5f5;
      --border: #eaeaea;
      --text: #171717;
      --text-dim: #737373;
      --accent: #171717;
      --accent-dim: #404040;
      --green: #16a34a;
      --green-dim: #15803d;
      --orange: #ea580c;
      --red: #dc2626;
      --yellow: #ca8a04;
      --pink: #db2777;
      --cyan: #0891b2;

      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --radius: 0px;
    }

    /* ========== Reset & Base ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== Layout ========== */
    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      box-shadow: none;
      padding: 32px 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 50;
    }

    .sidebar-brand {
      padding: 0 24px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-brand h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 2px;
    }

    .sidebar-brand span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
      display: block;
      margin-top: 2px;
    }

    .nav-label {
      padding: 8px 24px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }

    .lesson-nav {
      list-style: none;
      flex: 1;
      padding: 0;
      overflow-y: auto;
    }

    .lesson-nav li {
      padding: 8px 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      border-left: 3px solid transparent;
      display: block;
    }

    .lesson-nav li:hover {
      color: var(--text);
      background: var(--bg);
    }

    .lesson-nav li.active {
      color: var(--text);
      background: var(--bg);
      border-left: 3px solid var(--text);
    }

    .lesson-nav li .nav-num {
      display: inline-block;
      width: 20px;
      font-size: 12px;
      color: var(--text-dim);
      margin-right: 8px;
      font-variant-numeric: tabular-nums;
    }

    .lesson-nav li.active .nav-num {
      color: var(--text);
    }

    .lesson-nav li.completed .nav-num {
      color: var(--text);
    }


    /* ========== Main Content ========== */
    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 48px 40px;
      overflow-y: auto;
      position: relative;
    }

    .content,
    #lessonContent {
      max-width: 720px;
      width: 100%;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 260px;
      right: 0;
      height: 3px;
      background: var(--surface2);
      z-index: 60;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--text);
      transition: width 0.4s ease;
    }

    /* ========== Lesson Content ========== */
    .lesson h2 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .lesson .subtitle {
      color: var(--text-dim);
      font-size: 16px;
      margin-bottom: 48px;
    }

    .lesson h3 {
      font-size: clamp(1.125rem, 1.5vw + 0.75rem, 1.25rem);
      line-height: 1.3;
      font-weight: 600;
      margin: 40px 0 16px;
      color: var(--text);
    }

    .lesson p {
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .lesson li {
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .lesson ul, .lesson ol {
      padding-left: 20px;
      margin-bottom: 20px;
      list-style-position: outside;
    }

    .lesson ul li {
      list-style-type: disc;
    }

    /* ========== Concept Boxes ========== */
    .concept-box {
      background: transparent;
      border: none;
      border-left: 3px solid var(--border);
      border-radius: 0;
      padding: 0 0 0 20px;
      margin-bottom: 48px;
      position: relative;
      box-shadow: none;
    }

    .concept-box::before {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .concept-box.analogy {
      border-left: 3px solid var(--yellow);
    }

    .concept-box.analogy::before {
      content: "Think of it like this";
    }

    .concept-box.why {
      border-left: 3px solid var(--cyan);
    }

    .concept-box.why::before {
      content: "Why this matters";
    }

    .concept-box.tip {
      border-left: 3px solid var(--green);
    }

    .concept-box.tip::before {
      content: "Pro tip";
    }

    .concept-box.warning {
      border-left: 3px solid var(--orange);
    }

    .concept-box.warning::before {
      content: "Watch out";
    }

    /* ========== Code Blocks ========== */
    .code-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 16px 20px;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      overflow-x: auto;
      color: var(--text);
      margin-bottom: 48px;
      white-space: pre;
      box-shadow: none;
    }

    /* ========== Playground ========== */
    .playground {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
      margin-bottom: 48px;
      box-shadow: none;
    }

    .playground-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    .playground textarea {
      width: 100%;
      min-height: auto;
      max-height: 400px;
      overflow-y: auto;
      resize: none;
      background: var(--surface);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 0;
      outline: none;
      transition: border-color 0.15s;
    }

    .playground textarea::placeholder {
      color: var(--text-dim);
    }

    .playground textarea:focus-visible {
      border-color: var(--text);
    }

    .playground-actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    /* ========== Buttons ========== */
    .btn {
      padding: 12px 20px;
      border-radius: 0;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-run {
      background: var(--text);
      color: #ffffff;
      border: none;
      padding: 10px 24px;
      font-size: 14px;
      margin-bottom: 48px;
    }

    .btn-run:hover {
      background: var(--accent-dim);
      box-shadow: none;
    }

    .btn-run:active {
      transform: scale(0.97);
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .btn-reset:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .btn-hint {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .btn-hint:hover {
      border-color: var(--text);
      color: var(--text);
    }


    /* ========== Messages ========== */
    .message {
      padding: 12px 16px;
      font-size: 13px;
      font-family: var(--mono);
      border-radius: 0;
      margin: 0;
    }

    .message.success {
      color: var(--green);
      background: transparent;
      border: 1px solid var(--green);
    }

    .message.error {
      color: var(--red);
      background: transparent;
      border: 1px solid var(--red);
    }

    .message.info {
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
    }

    /* ========== Result Area ========== */
    .result-area {
      border-top: 1px solid var(--border);
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 14px;
      margin-bottom: 48px;
    }

    .result-table th {
      background: transparent;
      color: var(--text-dim);
      padding: 10px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
    }

    .result-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .result-table tr:nth-child(even) td {
      background: var(--surface);
    }

    .result-table tr:nth-child(odd) td {
      background: var(--bg);
    }

    .result-table .null-val {
      color: var(--text-dim);
      font-style: italic;
    }

    .result-meta {
      padding: 12px 16px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }

    /* ========== Exercise ========== */
    .exercise {
      background: transparent;
      border: none;
      border-left: 3px solid var(--text);
      border-radius: 0;
      padding: 0 0 0 20px;
      margin-bottom: 48px;
      box-shadow: none;
    }

    .exercise p {
      margin-bottom: 16px;
    }

    /* ========== Challenge Badges ========== */
    .challenge-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .challenge-badge.easy {
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green);
    }

    .challenge-badge.medium {
      background: transparent;
      color: var(--orange);
      border: 1px solid var(--orange);
    }

    .challenge-badge.hard {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
    }

    /* ========== Navigation Buttons ========== */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    .btn-nav {
      padding: 10px 24px;
      border: 1px solid var(--border);
      border-radius: 0;
      font-size: 14px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text);
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-nav:hover {
      background: var(--surface);
    }

    .btn-nav.primary {
      background: var(--text);
      color: #ffffff;
      border-color: var(--text);
    }

    .btn-nav.primary:hover {
      background: var(--accent-dim);
    }

    /* ========== Lesson Bottom Nav ========== */
    .lesson-nav-bottom {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ========== Schema Display ========== */
    .schema-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 16px;
      margin-bottom: 48px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.8;
      overflow-x: auto;
      color: var(--text);
      white-space: pre;
      box-shadow: none;
    }

    /* ========== Scrollbar Styling ========== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    /* ========== Mobile Toggle ========== */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 70;
      width: 40px;
      height: 40px;
      border-radius: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    /* ========== Animation ========== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lesson {
      animation: fadeIn 0.3s ease;
    }

    /* ========== Loading Overlay ========== */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== Scroll-Driven Animations ========== */
    .concept-box, .playground, .exercise, .schema-display, .code-block {
      animation: fadeInUp linear both;
      animation-timeline: view();
      animation-range: entry 0% entry 100%;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== Command Palette ========== */
    .cmd-item:hover {
      background: var(--surface2) !important;
    }



    /* ========== Responsive ========== */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        width: 100%;
      }

      .sidebar.open {
        display: flex;
      }

      .mobile-toggle {
        display: flex;
      }

      .main {
        padding: 24px 16px;
      }

      .progress-bar {
        left: 0;
      }
    }

    /* ========== Reduced Motion ========== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ========== Focus Visible ========== */
    :focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }
  </style>
</head>

      </div>
    </main>
  </div>

    function translateSQL(sql) {
      let translated = sql;

      // DATE_TRUNC('month', col) → strftime('%Y-%m', col)
      translated = translated.replace(
        /DATE_TRUNC\s*\(\s*'month'\s*,\s*([^)]+)\)/gi,
        "strftime('%Y-%m', $1)"
      );

      // DATE_TRUNC('year', col) → strftime('%Y', col)
      translated = translated.replace(
        /DATE_TRUNC\s*\(\s*'year'\s*,\s*([^)]+)\)/gi,
        "strftime('%Y', $1)"
      );

      // DATE_TRUNC('day', col) → date(col)
      translated = translated.replace(
        /DATE_TRUNC\s*\(\s*'day'\s*,\s*([^)]+)\)/gi,
        "date($1)"
      );

      // DATEADD('day', N, col) → date(col, '+N days')
      translated = translated.replace(
        /DATEADD\s*\(\s*'day'\s*,\s*(\d+)\s*,\s*([^)]+)\)/gi,
        "date($2, '+$1 days')"
      );

      // DATEADD('month', N, col) → date(col, '+N months')
      translated = translated.replace(
        /DATEADD\s*\(\s*'month'\s*,\s*(\d+)\s*,\s*([^)]+)\)/gi,
        "date($2, '+$1 months')"
      );

      // DATEDIFF('day', start, end) → julianday(end) - julianday(start)
      translated = translated.replace(
        /DATEDIFF\s*\(\s*'day'\s*,\s*([^,]+)\s*,\s*([^)]+)\)/gi,
        "CAST(julianday($2) - julianday($1) AS INTEGER)"
      );

      // CURRENT_DATE() → date('now')
      translated = translated.replace(/CURRENT_DATE\s*\(\s*\)/gi, "date('now')");

      // ILIKE → LIKE (SQLite is case-insensitive by default)
      translated = translated.replace(/\bILIKE\b/gi, 'LIKE');

      return translated;
    }

    function executeQuery(sql) {
      const translated = translateSQL(sql);
      return db.exec(translated);
    }

    function runPlayground(btn) {
      const playground = btn.closest('.playground');
      const textarea = playground.querySelector('textarea');
      const resultArea = playground.querySelector('.result-area');
      const sql = textarea.value.trim();

      if (!sql) {
        resultArea.innerHTML = '<div class="message info">Type a query and click Run.</div>';
        return;
      }

      try {
        const results = executeQuery(sql);

        if (!results || results.length === 0) {
          resultArea.innerHTML = '<div class="message success">Query executed successfully. No results to display.</div>';
          markLessonComplete();
          return;
        }

        const res = results[0];
        let html = '<table class="result-table"><thead><tr>';
        res.columns.forEach(c => { html += '<th>' + escapeHtml(c) + '</th>'; });
        html += '</tr></thead><tbody>';
        res.values.forEach(row => {
          html += '<tr>';
          row.forEach(v => {
            if (v === null) {
              html += '<td class="null-val">NULL</td>';
            } else {
              html += '<td>' + escapeHtml(String(v)) + '</td>';
            }
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        html += '<div class="result-meta">' + res.values.length + ' row' + (res.values.length !== 1 ? 's' : '') + ' returned</div>';
        resultArea.innerHTML = html;
        resultArea.setAttribute('aria-label', 'Query results');
        markLessonComplete();
      } catch (err) {
        resultArea.innerHTML = '<div class="message error">Error: ' + escapeHtml(err.message) + '</div>';
      }
    }

    function autoResizeTextarea(ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }

    function resetPlayground(btn) {
      const playground = btn.closest('.playground');
      const textarea = playground.querySelector('textarea');
      const resultArea = playground.querySelector('.result-area');
      const original = playground.getAttribute('data-query');
      if (original) textarea.value = original;
      autoResizeTextarea(textarea);
      resultArea.innerHTML = '';
    }

    function showHint(btn, hint) {
      const playground = btn.closest('.playground') || btn.closest('.exercise').querySelector('.playground');
      const resultArea = playground.querySelector('.result-area');
      resultArea.innerHTML = '<div class="message info">💡 Hint: ' + escapeHtml(hint) + '</div>';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function attachPlaygroundHandlers(container) {
      container.querySelectorAll('.playground textarea').forEach(ta => {
        if (!ta.getAttribute('aria-label')) {
          ta.setAttribute('aria-label', 'SQL query editor');
        }
        ta.addEventListener('keydown', (e) => {
          if (e.key === 'Tab') {
            e.preventDefault();
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
            ta.selectionStart = ta.selectionEnd = start + 2;
          }
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            const btn = ta.closest('.playground').querySelector('.btn-run');
            if (btn) runPlayground(btn);
          }
        });

        // Auto-resize to fit content
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';

        // Also resize when content changes (e.g. reset)
        ta.addEventListener('input', () => autoResizeTextarea(ta));
      });
    }

        <p class="subtitle">How do I rank or compare rows within a group?</p>

        <div class="concept-box analogy">

  ) AS rank_in_category
FROM products;">

            <button class="btn btn-run" onclick="runPlayground(this)">▶ Run</button>

        <h3>RANK and DENSE_RANK</h3>

    function cheatsheetContent() { return `
<h2>SQL Quick Reference</h2>
<p class="subtitle">Your desk reference — bookmark this page.</p>

<h3>Basic query structure</h3>
<div class="code-block"><span class="kw">SELECT</span> column1, column2, <span class="fn">COUNT</span>(*)
<span class="kw">FROM</span> table_name
<span class="kw">JOIN</span> other_table <span class="kw">ON</span> table.id = other_table.table_id
<span class="kw">WHERE</span> condition
<span class="kw">GROUP BY</span> column1
<span class="kw">HAVING</span> aggregate_condition
<span class="kw">ORDER BY</span> column1 <span class="kw">DESC</span>
<span class="kw">LIMIT</span> <span class="num">10</span>;</div>

<h3>Comparison operators</h3>
<div class="schema-display">
  <div><span class="col-name">=  !=  >  <  >=  <=</span> <span class="col-desc">— basic comparisons</span></div>
  <div><span class="col-name">AND  OR  NOT</span> <span class="col-desc">— combine conditions</span></div>
  <div><span class="col-name">BETWEEN x AND y</span> <span class="col-desc">— range (inclusive)</span></div>
  <div><span class="col-name">IN ('a', 'b')</span> <span class="col-desc">— match any in list</span></div>
  <div><span class="col-name">LIKE '%text%'</span> <span class="col-desc">— pattern match</span></div>
  <div><span class="col-name">IS NULL / IS NOT NULL</span> <span class="col-desc">— empty values</span></div>
</div>

<h3>Aggregate functions</h3>
<div class="schema-display">
  <div><span class="col-name">COUNT(*)</span> <span class="col-desc">— number of rows</span></div>
  <div><span class="col-name">SUM(column)</span> <span class="col-desc">— total</span></div>
  <div><span class="col-name">AVG(column)</span> <span class="col-desc">— average</span></div>
  <div><span class="col-name">MIN(column)</span> <span class="col-desc">— minimum</span></div>
  <div><span class="col-name">MAX(column)</span> <span class="col-desc">— maximum</span></div>
</div>

<h3>Date functions (Snowflake / BigQuery)</h3>
<div class="schema-display">
  <div><span class="col-name">DATE_TRUNC('month', date_col)</span> <span class="col-desc">— truncate to month</span></div>
  <div><span class="col-name">DATEADD('day', 30, date_col)</span> <span class="col-desc">— add 30 days</span></div>
  <div><span class="col-name">DATEDIFF('day', start, end)</span> <span class="col-desc">— days between dates</span></div>
  <div><span class="col-name">CURRENT_DATE()</span> <span class="col-desc">— today's date</span></div>
</div>

<h3>String functions</h3>
<div class="schema-display">
  <div><span class="col-name">SUBSTRING(col, 1, 5)</span> <span class="col-desc">— first 5 characters</span></div>
  <div><span class="col-name">UPPER(col) / LOWER(col)</span> <span class="col-desc">— change case</span></div>
  <div><span class="col-name">TRIM(col)</span> <span class="col-desc">— remove whitespace</span></div>
  <div><span class="col-name">CONCAT(a, b)</span> <span class="col-desc">— join strings</span></div>
  <div><span class="col-name">REPLACE(col, 'old', 'new')</span> <span class="col-desc">— find and replace</span></div>
</div>

<h3>CASE WHEN</h3>
<div class="code-block"><span class="kw">CASE WHEN</span> condition <span class="kw">THEN</span> value
     <span class="kw">WHEN</span> condition2 <span class="kw">THEN</span> value2
     <span class="kw">ELSE</span> default_value
<span class="kw">END</span></div>

<h3>Window functions</h3>
<div class="schema-display">
  <div><span class="col-name">ROW_NUMBER() OVER (...)</span> <span class="col-desc">— unique sequential number</span></div>
  <div><span class="col-name">RANK() OVER (...)</span> <span class="col-desc">— rank with gaps</span></div>
  <div><span class="col-name">DENSE_RANK() OVER (...)</span> <span class="col-desc">— rank without gaps</span></div>
  <div><span class="col-name">SUM(col) OVER (ORDER BY ...)</span> <span class="col-desc">— running total</span></div>
  <div><span class="col-name">LAG(col) OVER (...)</span> <span class="col-desc">— previous row value</span></div>
  <div><span class="col-name">LEAD(col) OVER (...)</span> <span class="col-desc">— next row value</span></div>
</div>

<h3>CTEs</h3>
<div class="code-block"><span class="kw">WITH</span> cte_name <span class="kw">AS</span> (
  <span class="kw">SELECT</span> ... <span class="kw">FROM</span> ...
)
<span class="kw">SELECT</span> ... <span class="kw">FROM</span> cte_name;</div>

<h3>Common patterns</h3>
<div class="schema-display">
  <div><span class="col-name">Top N per group</span> <span class="col-desc">— use ROW_NUMBER() or RANK()</span></div>
  <div><span class="col-name">Running total</span> <span class="col-desc">— SUM() OVER (ORDER BY ...)</span></div>
  <div><span class="col-name">Month-over-month</span> <span class="col-desc">— LAG() or self-join</span></div>
  <div><span class="col-name">Deduplicate</span> <span class="col-desc">— ROW_NUMBER() = 1</span></div>
</div>

<h3>Common mistakes</h3>
<div class="schema-display">
  <div><span class="col-name">= NULL</span> <span class="col-desc">— use IS NULL instead</span></div>
  <div><span class="col-name">WHERE on aggregates</span> <span class="col-desc">— use HAVING after GROUP BY</span></div>
  <div><span class="col-name">Missing GROUP BY</span> <span class="col-desc">— required when mixing aggregates with other columns</span></div>
  <div><span class="col-name">Wrong JOIN type</span> <span class="col-desc">— INNER drops rows, LEFT keeps all from left table</span></div>
</div>
`; }

            <div class="date">${today}</div>
          </div>

    // ========== Keyboard Shortcuts ==========
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' && e.altKey) {
        if (currentLesson < lessons.length - 1) goToLesson(currentLesson + 1);
      }
      if (e.key === 'ArrowLeft' && e.altKey) {
        if (currentLesson > 0) goToLesson(currentLesson - 1);
      }
    });

    // ========== Init ==========
    initDatabase().then(() => {
      document.getElementById('loadingOverlay').style.display = 'none';
      renderLesson();
    }).catch(err => {
      console.error('Failed to initialize database:', err);
      document.getElementById('loadingOverlay').innerHTML = '<p style="color:var(--red);font-family:var(--font);font-size:14px;">Failed to load database. Please refresh the page.</p>';
    });
  </script>

  <div id="commandPalette" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;padding-top:15vh;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:480px;max-width:90vw;box-shadow:none;overflow:hidden;">
      <input id="cmdInput" type="text" placeholder="Search lessons..." style="width:100%;padding:16px 20px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--font);font-size:15px;outline:none;box-sizing:border-box;">
      <div id="cmdResults" style="max-height:300px;overflow-y:auto;"></div>
    </div>
  </div>

  <script>
    // Command palette
    const cmdPalette = document.getElementById('commandPalette');
    const cmdInput = document.getElementById('cmdInput');
    const cmdResults = document.getElementById('cmdResults');

    function openCommandPalette() {
      cmdPalette.style.display = 'flex';
      cmdInput.value = '';
      filterCommandPalette();
      setTimeout(() => cmdInput.focus(), 50);
    }

    function closeCommandPalette() {
      cmdPalette.style.display = 'none';
    }

    function filterCommandPalette() {
      const query = cmdInput.value.toLowerCase();
      const filtered = lessons
        .map((l, i) => ({ ...l, index: i }))
        .filter(l => l.title.toLowerCase().includes(query) || l.id.toLowerCase().includes(query));

      cmdResults.innerHTML = filtered.map(l =>
        '<div class="cmd-item" onclick="goToLesson(' + l.index + ');closeCommandPalette();" style="padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background 0.1s;' + (l.index === currentLesson ? 'background:var(--surface2);' : '') + '">'
        + '<span style="font-size:18px;">' + l.icon + '</span>'
        + '<span style="color:var(--text);font-size:14px;">' + l.title + '</span>'
        + (l.index === currentLesson ? '<span style="margin-left:auto;font-size:11px;color:var(--accent);">Current</span>' : '')
        + '</div>'
      ).join('');
    }

    cmdPalette.addEventListener('click', (e) => {
      if (e.target === cmdPalette) closeCommandPalette();
    });

    cmdInput.addEventListener('input', filterCommandPalette);

    cmdInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeCommandPalette();
      if (e.key === 'Enter') {
        const first = cmdResults.querySelector('.cmd-item');
        if (first) first.click();
      }
    });

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        if (cmdPalette.style.display === 'flex') {
          closeCommandPalette();
        } else {
          openCommandPalette();
        }
      }
    });
  </script>
</body>
</html>
