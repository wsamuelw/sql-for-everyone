<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidy Up Game!</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #B2EBF2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 600px; height: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; text-align: center; position: relative; }
        h2 { font-size: 32px; color: #333; }
        .btn { padding: 15px 30px; font-size: 24px; cursor: pointer; border-radius: 15px; background: #FFF9C4; border: 3px solid #FBC02D; transition: transform 0.2s, background 0.2s; }
        .btn:hover { background: #FFF59D; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .hidden { display: none; }
        .pile-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .pile { font-size: 60px; cursor: pointer; transition: transform 0.2s; user-select: none; }
        .pile:active { transform: scale(0.9); }
        .item { font-size: 45px; cursor: grab; margin: 10px; display: inline-block; }
        .bin { width: 110px; height: 110px; border: 3px dashed #aaa; border-radius: 15px; display: inline-flex; align-items: center; justify-content: center; margin: 10px; vertical-align: top; font-size: 14px; font-weight: bold; }
        .bin.hover { background: #c8e6c9; border-color: #4caf50; }
        .reward-emoji { font-size: 100px; display: block; margin: 20px 0; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="nav-bar" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;"></div>
        <div id="tidy-meter" style="margin-bottom: 10px; font-size: 20px;"></div>
        <div id="scene-content"></div>
        <div id="controls" style="margin-top: 20px;"></div>
    </div>
    <script>
        const GAME_CONFIG = {
            characterName: "Tidy Sam",
            targetToy: "🦖",
            targetToyName: "Dinosaur",
            rooms: {
                dining: {
                    id: 'dining',
                    name: "Dining Area",
                    color: "#FFE0B2", // Soft Orange
                    items: [
                        { id: 'apple', emoji: '🍎', bin: 'Dining' },
                        { id: 'cookie', emoji: '🍪', bin: 'Dining' },
                        { id: 'fork', emoji: '🍴', bin: 'Dining' }
                    ]
                },
                living: {
                    id: 'living',
                    name: "Living Area",
                    color: "#C8E6C9", // Soft Green
                    items: [
                        { id: 'book', emoji: '📚', bin: 'Living' },
                        { id: 'remote', emoji: '📺', bin: 'Living' },
                        { id: 'pillow', emoji: '🛋️', bin: 'Living' }
                    ]
                },
                toy: {
                    id: 'toy',
                    name: "Toy Area",
                    color: "#E1BEE7", // Soft Purple
                    items: [
                        { id: 'block', emoji: '🧱', bin: 'Toy' },
                        { id: 'ball', emoji: '⚽', bin: 'Toy' },
                        { id: 'train', emoji: '🚂', bin: 'Toy' }
                    ]
                }
            },
            bins: ['Dining', 'Living', 'Toy']
        };
        console.log("Game Config Loaded:", GAME_CONFIG);

        const state = {
            currentScene: 'GOAL',
            itemsTidied: 0
        };

        const scenes = {
            GOAL: {
                text: () => `${GAME_CONFIG.characterName} wants to play with their ${GAME_CONFIG.targetToyName}!`,
                action: "Let's look for it!",
                next: 'STRUGGLE'
            },
            STRUGGLE: {
                text: () => `Where is the ${GAME_CONFIG.targetToyName}? Click the piles!`,
                action: "Search",
                next: 'OOPS'
            },
            OOPS: {
                text: () => `Oh no! ${GAME_CONFIG.characterName} almost tripped! It's hard to walk safely when things are on the floor.`,
                action: "Let's tidy up!",
                next: 'QUEST'
            },
            QUEST: {
                text: () => `Help ${GAME_CONFIG.characterName} tidy up the room!`,
                action: "Play",
                next: 'SUCCESS'
            },
            SUCCESS: {
                text: () => `Yay! The room is safe and tidy. Now we can find the ${GAME_CONFIG.targetToyName} easily!`,
                action: "Play Again",
                next: 'GOAL'
            }
        };

        function renderScene() {
            const scene = scenes[state.currentScene];
            const content = document.getElementById('scene-content');
            const controls = document.getElementById('controls');

            content.innerHTML = `<h2 class="fade-in">${scene.text()}</h2>`;
            content.className = ''; // reset

            if (state.currentScene === 'SUCCESS') {
                const reward = document.createElement('div');
                reward.className = 'reward-emoji fade-in';
                reward.textContent = GAME_CONFIG.targetToy;
                content.appendChild(reward);
            }

            if (state.currentScene === 'STRUGGLE') {
                const pileContainer = document.createElement('div');
                pileContainer.className = 'pile-container fade-in';

                const wrongItems = ['🧦', '👟', '🧸', '🎨', '🧩'];
                let pilesRevealed = 0;

                for (let i = 0; i < 3; i++) {
                    const pile = document.createElement('div');
                    pile.className = 'pile';
                    pile.textContent = '📦';

                    pile.onclick = () => {
                        if (pile.textContent === '📦') {
                            pile.textContent = wrongItems[Math.floor(Math.random() * wrongItems.length)];
                            pilesRevealed++;
                            if (pilesRevealed === 3) {
                                const nextBtn = document.getElementById('next-btn');
                                if (nextBtn) nextBtn.classList.remove('hidden');
                            }
                        }
                    };
                    pileContainer.appendChild(pile);
                }
                content.appendChild(pileContainer);
                controls.innerHTML = `<button id="next-btn" class="btn hidden">${scene.action}</button>`;
            } else if (state.currentScene === 'QUEST') {
                state.itemsTidied = 0;
                const gameArea = document.createElement('div');
                gameArea.className = 'fade-in';

                const itemsDiv = document.createElement('div');
                GAME_CONFIG.itemsToTidy.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'item';
                    el.innerHTML = item.emoji;
                    el.draggable = true;
                    el.id = item.id;
                    el.ondragstart = (e) => e.dataTransfer.setData('text', item.id);
                    itemsDiv.appendChild(el);
                });

                const binsDiv = document.createElement('div');
                const binNames = [...new Set(GAME_CONFIG.itemsToTidy.map(i => i.bin))];
                binNames.forEach(binName => {
                    const bin = document.createElement('div');
                    bin.className = 'bin';
                    bin.innerHTML = binName;
                    bin.ondragover = (e) => { e.preventDefault(); bin.classList.add('hover'); };
                    bin.ondragleave = () => bin.classList.remove('hover');
                    bin.ondrop = (e) => {
                        e.preventDefault();
                        bin.classList.remove('hover');
                        const itemId = e.dataTransfer.getData('text');
                        const itemData = GAME_CONFIG.itemsToTidy.find(i => i.id === itemId);
                        if (itemData && itemData.bin === binName) {
                            const itemEl = document.getElementById(itemId);
                            if (itemEl) itemEl.classList.add('hidden');
                            state.itemsTidied++;
                            if (state.itemsTidied === GAME_CONFIG.itemsToTidy.length) {
                                const nextBtn = document.getElementById('next-btn');
                                if (nextBtn) nextBtn.classList.remove('hidden');
                            }
                        }
                    };
                    binsDiv.appendChild(bin);
                });

                gameArea.appendChild(itemsDiv);
                gameArea.appendChild(binsDiv);
                content.appendChild(gameArea);
                controls.innerHTML = `<button id="next-btn" class="btn hidden">${scene.action}</button>`;
            } else {
                controls.innerHTML = `<button id="next-btn" class="btn">${scene.action}</button>`;
            }

            const nextBtn = document.getElementById('next-btn');
            if (nextBtn) {
                nextBtn.onclick = () => {
                    state.currentScene = scene.next;
                    renderScene();
                };
            }
        }
        renderScene();

    </script>
</body>
</html>
